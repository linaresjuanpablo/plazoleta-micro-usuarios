server:
  port: 8083

spring:
  application:
    name: ms-usuarios
  datasource:
    url: jdbc:mysql://localhost:3306/bd_usuarios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
  secret: Z2FzdHJvcG9saXMtc2VjcmV0LWtleS1mb3Itand0LXZlcnktbG9uZy1zdHJpbmctMjAyNg==
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
